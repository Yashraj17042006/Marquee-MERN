<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="card1.css">
</head>
<body>

<div class="container">

    <div class="card">

        <img src="https://fenil10-portfolio.vercel.app/fenil.png"
            class="profile">

        <h2>Fenil Sakhiya</h2>
        <p>
            vibe Coder
        </p>

        <div class="stats">

            <div>
                <h3>1000</h3>
                <span>Posts</span>
            </div>

            <div>
                <h3>940k</h3>
                <span>Followers</span>
            </div>

            <div>
                <h3>1853</h3>
                <span>Following</span>
            </div>

        </div>

        <div class="buttons">
            <button class="follow">Follow</button>
            <button class="message">Message</button>
        </div>

    </div>

</div>

</body>
</html>
