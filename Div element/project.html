  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #f2d9ca 0%, #f7e5da 45%, #f2d9ca 100%);
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 470px;
      background: #fff;
      border-radius: 42px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 26px 60px rgba(155, 110, 74, 0.22);
    }

    .card__top {
      position: relative;
      height: 560px;
      background: #f7f7f7;
      overflow: hidden;
    }

    /* .heart-badge {
      position: absolute;
      top: 32px;
      left: 32px;

      background: #d5a379;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 30px;
      font-weight: 700;
      z-index: 2;
    } */

    .product-image {
      position: absolute;
      inset: 0;
      height: 100%;
      width: 100%;
      object-fit: fill;
      object-position: center;
    }



    .card__bottom {
      position: relative;
      padding: 0 34px 34px;
      margin-top: -28px;
      z-index: 3;
    }

    .swatches {
      display: flex;
      gap: 14px;
      justify-content: center;
      margin-bottom: 18px;
    }

    .swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.95);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.08);
    }

    .swatch.one { background: chocolate; }
    .swatch.two { background: #eea543; }
    .swatch.three { background: #f4b37d; }
    .swatch.four { background: #111111; }

    .product-name {
      color: #d08a2a;
      width: 100%;
      height: 100%;
      font-size: 30px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .price {
      display: inline-block;
      background: #111;
      color: #fff;
      border-radius: 999px;
      padding: 8px 18px;
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 14px;
    }

    .price span {
      font-size: 17px;
      font-weight: 700;
      opacity: 0.95;
    }

    .description {
      color: #b2b2b2;
      font-size: 17px;
      line-height: 1.35;
      max-width: 360px;
    }

  

      .card {
        border-radius: 30px;
      }

      .card__top {
        height: 470px;
      }

      .heart-badge {
        width: 60px;
        height: 60px;
        top: 22px;
        left: 22px;
        font-size: 26px;
      }

      .card__bottom {
        padding: 0 22px 24px;
      }

      .product-name {
        font-size: 24px;
      }

      .price {
        font-size: 20px;
      }

      .price span {
        font-size: 15px;
      }

      .description {
        font-size: 15px;
      }
    
  </style>
